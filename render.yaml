# NEXUS backend — Render Blueprint (FREE tier, no credit card).
#
# Uses the existing free Supabase Postgres for the database and an in-memory
# cache (no Redis needed). Only one free web service is created.
#
# In Render: New → Blueprint → repo reuvenre/AliBot-PRO → branch `main`.
# After the first apply, fill the secrets marked `sync: false` in the dashboard.
#
# Note: the free instance spins down after ~15 min of inactivity (cold start on
# the next request), so the background schedulers (posts/boost) run only while
# the service is awake. Upgrade to a paid instance for always-on automation.
services:
  - type: web
    name: nexus-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_SSL
        value: 'true'
      # Supabase Postgres connection string (already provisioned with full schema):
      #   postgresql://postgres:[DB-PASSWORD]@db.pyppovzopxleknwmgdiu.supabase.co:5432/postgres
      # Get the password from Supabase → Project Settings → Database.
      - key: DATABASE_URL
        sync: false
      # JWT secrets — generated automatically
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # ENCRYPTION_KEY must be 32-byte hex: openssl rand -hex 32
      - key: ENCRYPTION_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      # No REDIS_URL → the app uses an in-memory cache automatically.
